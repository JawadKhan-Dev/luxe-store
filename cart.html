<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — LUXE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/checkout.css">
</head>
<body>

<header id="header">
  <nav class="navbar">
    <div class="nav-left">
      <a href="shop.html" class="nav-link">← Continue Shopping</a>
    </div>
    <div class="nav-logo"><a href="index.html">LUXE</a></div>
    <div class="nav-right">
      <a href="cart.html" class="nav-link cart-icon">
        <i class="fa-solid fa-bag-shopping"></i>
        <span class="cart-count">0</span>
      </a>
    </div>
  </nav>
</header>

<div class="page-banner">
  <div class="container">
    <div class="page-banner-content">
      <span class="page-banner-tag">Your Selection</span>
      <h1>Shopping <em>Cart</em></h1>
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <i class="fa-solid fa-chevron-right" style="font-size:0.5rem"></i>
        <span>Cart</span>
      </div>
    </div>
  </div>
</div>

<!-- Checkout Progress Bar -->
<div class="checkout-steps">
  <div class="step active"><span>1</span> Cart</div>
  <div class="step-line"></div>
  <div class="step"><span>2</span> Checkout</div>
  <div class="step-line"></div>
  <div class="step"><span>3</span> Confirm</div>
</div>

<div class="container">
  <div class="cart-layout" id="cartLayout">
    <!-- populated by JS -->
  </div>
</div>

<button id="backToTop"><i class="fa-solid fa-arrow-up"></i></button>
<script src="js/store.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
