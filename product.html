<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — LUXE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/product.css">
</head>
<body>

<header id="header">
  <nav class="navbar">
    <div class="nav-left">
      <a href="shop.html" class="nav-link">Shop</a>
      <a href="shop.html?cat=shoes" class="nav-link">Shoes</a>
      <a href="shop.html?cat=watches" class="nav-link">Watches</a>
    </div>
    <div class="nav-logo"><a href="index.html">LUXE</a></div>
    <div class="nav-right">
      <a href="#" class="nav-link"><i class="fa-regular fa-user"></i></a>
      <a href="#" class="nav-link"><i class="fa-regular fa-heart"></i></a>
      <a href="cart.html" class="nav-link cart-icon">
        <i class="fa-solid fa-bag-shopping"></i>
        <span class="cart-count">0</span>
      </a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="cart.html">Cart</a>
  </div>
</header>

<!-- PRODUCT PAGE -->
<div class="product-page">
  <!-- Breadcrumb -->
  <div class="container">
    <div class="breadcrumb" style="padding: 100px 0 0; margin-bottom: 40px;" id="prodBreadcrumb">
      <a href="index.html">Home</a>
      <i class="fa-solid fa-chevron-right" style="font-size:0.5rem"></i>
      <a href="shop.html">Shop</a>
      <i class="fa-solid fa-chevron-right" style="font-size:0.5rem"></i>
      <span id="prodBreadcrumbCat">—</span>
    </div>
  </div>

  <!-- Main Product Layout -->
  <div class="container">
    <div class="product-layout" id="productLayout">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Product Tabs -->
  <div class="container" style="margin-top: 80px;">
    <div class="prod-tabs">
      <button class="prod-tab active" data-tab="description">Description</button>
      <button class="prod-tab" data-tab="details">Details & Care</button>
      <button class="prod-tab" data-tab="reviews">Reviews</button>
      <button class="prod-tab" data-tab="shipping">Shipping</button>
    </div>
    <div class="prod-tab-content" id="prodTabContent">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Related Products -->
  <div class="container" style="margin: 80px 0;">
    <div class="section-header" style="text-align:left; margin-bottom:36px;">
      <span class="section-tag">You May Also Like</span>
      <h2 class="section-title" style="font-size:2rem;">Related <em>Products</em></h2>
    </div>
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</div>

<button id="backToTop"><i class="fa-solid fa-arrow-up"></i></button>
<script src="js/store.js"></script>
<script src="js/product.js"></script>
</body>
</html>
